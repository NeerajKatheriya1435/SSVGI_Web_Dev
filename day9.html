<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        @media (max-width:600px) {
            #box1{
                background-color: aqua;
                font-size: 25px;
                height: 30px;
            }
            #box2{
                display: none;
            }
            #box3{
                display: none;
            }
        }

        @media (min-width:600px) and (max-width:900px) {
            #box1{
                background-color: rgb(255, 0, 212);
                font-size: 34px;
                height: 60px;

            }
            #box2{
                display: none;
            }
        }
        @media (min-width:900px) and (max-width:1400px) {
            #box1{
                background-color: rgb(38, 204, 96);
                font-size: 45px;
                height: 100px;
            }
        }
        
    </style>
</head>
<body>
    
    <div class="box">
        <h1 align="center" class="box" id="box1">My Big Computer</h1>
        <h1 class="box" id="box2">My Tablet Computer</h1>
        <h1 class="box" id="box3">My Phone Computer</h1>
    </div>
</body>
</html>
