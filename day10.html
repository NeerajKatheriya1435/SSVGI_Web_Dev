<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: aqua;
            width: 200px;
            height: 200px;
            border: 2px solid salmon;
        }
        
        .box1{
            background-color: rgb(185, 228, 199);
            width: 50px;
            height: 50px;
            font-size: 20px;
            border: 2px solid salmon;
            transition: all 2s ease-in-out;
        }
        .box1:hover{
            width: 500px;
            height: 300px;
            font-size: 200px;
            background-color: rgb(239, 73, 98);
            border-radius: 50px;
            /* text-align: center; */
            margin: 50px;
        }
    </style>
</head>
<body>
    
    <div class="box">
        <div class="box1">
            Hello
        </div>
    </div>
</body>
</html>
